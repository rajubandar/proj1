# Service — exposes the Nginx Deployment outside the cluster
# NodePort 30080 is mapped to host port 30080 via kind-config.yaml
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80        # Service port (cluster-internal)
      targetPort: 80  # Container port
      nodePort: 30080 # External port (accessible on host via Kind port mapping)
