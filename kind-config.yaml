# Kind cluster configuration
# Maps host port 30080 to the container's port 30080
# so the NodePort Service is reachable at http://localhost:30080
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: nginx-cluster
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
